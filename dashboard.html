<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إضافة طلب</title>
    <style>
/* إعدادات النظام وخط سان فرانسيسكو */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

body {
    /* خلفية كاملة بتدرج البنفسجي الغامق والفاتح الفخم */
    background: radial-gradient(circle at 30% 20%, #2e1a47 0%, #120721 100%);
    color: #ffffff;
    min-height: 100vh;
    overflow-x: hidden;
}

.dashboard-wrapper {
    display: flex;
    min-height: 100vh;
    position: relative;
}

/* --- زر الـ 3 خطوط التفاعلي (Hamburger Menu) --- */
.menu-toggle-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background-color: #ff3344; /* لمسة باللون الأحمر الفاتن */
    color: white;
    border: none;
    padding: 12px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    z-index: 100;
    box-shadow: 0 4px 15px rgba(255, 51, 68, 0.3);
    transition: all 0.2s ease;
}

.menu-toggle-btn:hover {
    background-color: #e62233;
    transform: scale(1.05);
}

/* --- تصميم القائمة الجانبية (Sidebar البنفسجي والمنظم) --- */
.sidebar {
    width: 260px;
    background-color: rgba(18, 7, 33, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    padding: 30px 16px;
    position: fixed;
    height: 100vh;
    right: -260px; /* مخفي تلقائياً في الشاشات الصغيرة ويظهر عند الضغط */
    top: 0;
    z-index: 90;
    transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* الكلاس اللي يتفعل بالـ JavaScript لفتح القائمة */
.sidebar.open {
    right: 0;
}

.sidebar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 19px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 40px;
    padding-right: 12px;
}

.purple-icon {
    color: #a855f7;
}

.sidebar-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* تحويل الأزرار لروابط لتسهيل التنقل المباشر للملفات */
.menu-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: none;
    border: none;
    padding: 14px 16px;
    border-radius: 12px;
    cursor: pointer;
    text-align: right;
    color: #a29db0;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.2s ease;
    width: 100%;
    text-decoration: none; /* لإزالة التسطير الافتراضي للروابط */
}

.menu-item:hover {
    background-color: rgba(255, 255, 255, 0.05);
    color: #a855f7;
}

.menu-item.active {
    background-color: #a855f7; /* الزر النشط بالبنفسجي */
    color: #ffffff;
    box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
}

.logout-btn {
    margin-top: auto;
    color: #ff3344;
}

.logout-btn:hover {
    background-color: rgba(255, 51, 68, 0.1);
    color: #ff3344;
}

/* --- قسم المحتوى الرئيسي --- */
.main-content {
    flex: 1;
    margin-right: 0; /* مرن وممتد ليغطي الشاشة */
    padding: 40px 30px;
    padding-top: 90px; /* مسافة لكي لا يختفي المحتوى تحت زر الـ 3 خطوط */
    width: 100%;
}

.content-header {
    margin-bottom: 35px;
    display: flex;
    align-items: center;
}

.user-welcome {
    font-size: 16px;
    color: #e2def0;
}

.section-title-box h2 {
    font-size: 24px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 6px;
}

.section-subtitle {
    font-size: 14px;
    color: #a29db0;
    margin-bottom: 30px;
}

/* --- تصميم شبكة بطاقات الإدخال (Cards Grid) --- */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.input-card {
    background-color: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: all 0.25s ease;
}

.input-card:hover {
    transform: translateY(-2px);
    border-color: rgba(168, 85, 247, 0.3);
    background-color: rgba(255, 255, 255, 0.06);
}

/* تمييز كروت الإدخال الإجبارية بخط جانبي أحمر ناعم */
.input-card.mandatory {
    border-right: 4px solid #ff3344;
}

.full-width-card {
    grid-column: 1 / -1; /* جعل بطاقة الملاحظات تأخذ العرض الكامل للشبكة */
}

.card-header-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    margin-bottom: 16px;
}

.card-height-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    margin-bottom: 16px;
}

.red-bg { background-color: rgba(255, 51, 68, 0.15); color: #ff3344; }
.purple-bg { background-color: rgba(168, 85, 247, 0.15); color: #a855f7; }

label {
    font-size: 14px;
    font-weight: 600;
    color: #e2def0;
    margin-bottom: 10px;
}

.required-mark { color: #ff3344; margin-right: 4px; }
.optional-mark { color: #a29db0; font-size: 12px; margin-right: 4px; font-weight: 400; }

input, textarea {
    width: 100%;
    padding: 12px 14px;
    background-color: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    color: #ffffff;
    font-size: 14.5px;
    transition: all 0.2s ease;
    text-align: right;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #a855f7;
    background-color: rgba(0, 0, 0, 0.3);
    box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
}

/* --- زر إضافة طلب الأخضر الفخم --- */
.btn-submit-order {
    background-color: #24b263; /* اللون الأخضر للقبول والإرسال */
    color: white;
    border: none;
    padding: 15px 35px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(36, 178, 99, 0.25);
}

.btn-submit-order:hover {
    background-color: #1e9652;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(36, 178, 99, 0.35);
}

/* --- استعلامات الشاشات الكبيرة لتثبيت السايدبار تلقائياً --- */
@media (min-width: 769px) {
    .sidebar {
        right: 0; /* ثابت دائماً على الكمبيوتر */
    }
    .main-content {
        margin-right: 260px; /* إزاحة المحتوى ليظهر بجانب السايدبار الثابت */
        padding-top: 40px;
    }
    .menu-toggle-btn {
        display: none; /* إخفاء زر الـ 3 خطوط على الكمبيوتر لأنه ليس بحاجة له */
    }
}</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        
        <button class="menu-toggle-btn" id="menuToggle" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-wallet purple-icon"></i>
                <span>منصة الوساطة</span>
            </div>
            
            <nav class="sidebar-menu">
                <!-- هذا الملف يمثل إضافة طلب، لذلك يبقى هو الـ active -->
                <a href="dashboard.html" class="menu-item active">
                    <i class="fas fa-plus-circle"></i>
                    <span>إضافة طلب جديد</span>
                </a>
                
                <!-- الانتقال لملف طلباتي المستقل -->
                <a href="my-orders.html" class="menu-item">
                    <i class="fas fa-shopping-bag"></i>
                    <span>طلباتي</span>
                </a>
                
                <!-- الانتقال لملف حسابي المستقل -->
                <a href="my-account.html" class="menu-item">
                    <i class="fas fa-user-circle"></i>
                    <span>حسابي</span>
                </a>

                <!-- الانتقال لملف الدعم الفني المستقل -->
                <a href="support.html" class="menu-item">
                    <i class="fas fa-headset"></i>
                    <span>الدعم الفني</span>
                </a>
                
                <button class="menu-item logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </button>
            </nav>
        </aside>

        <main class="main-content">
            
            <header class="content-header">
                <div class="user-welcome">
                    <span>مرحباً بك، <strong>مريم</strong> 👋</span>
                </div>
            </header>

            <div class="content-body">
                
                <!-- تم الإبقاء على فورم إضافة الطلب فقط في هذا الملف -->
                <section id="new-order" class="content-section active">
                    <div class="section-title-box">
                        <h2>إنشاء طلب وساطة جديد</h2>
                        <p class="section-subtitle">قم بملء بطاقات المنتج التالية لإرسال الطلب للآدمن</p>
                    </div>
                    
                    <form id="orderForm" onsubmit="submitOrder(event)">
                        <div class="cards-grid">
                            
                            <div class="input-card mandatory">
                                <div class="card-header-icon red-bg">
                                    <i class="fas fa-link"></i>
                                </div>
                                <label for="productLink">رابط المنتج <span class="required-mark">*</span></label>
                                <input type="url" id="productLink" required placeholder="https://example.com/product...">
                            </div>

                            <div class="input-card mandatory">
                                <div class="card-header-icon red-bg">
                                    <i class="fas fa-calculator"></i>
                                </div>
                                <label for="productQty">الكمية <span class="required-mark">*</span></label>
                                <input type="number" id="productQty" min="1" value="1" required placeholder="1">
                            </div>

                            <div class="input-card optional">
                                <div class="card-header-icon purple-bg">
                                    <i class="fas fa-palette"></i>
                                </div>
                                <label for="productColor">اللون <span class="optional-mark">(اختياري)</span></label>
                                <input type="text" id="productColor" placeholder="مثال: أسود، أزرق ملكي...">
                            </div>

                            <div class="input-card optional">
                                <div class="card-height-icon purple-bg">
                                    <i class="fas fa-ruler-combined"></i>
                                </div>
                                <label for="productSize">القياس / المقاس <span class="optional-mark">(اختياري)</span></label>
                                <input type="text" id="productSize" placeholder="مثال: XL, 42, Medium...">
                            </div>

                            <div class="input-card optional full-width-card">
                                <div class="card-header-icon purple-bg">
                                    <i class="fas fa-comment-alt"></i>
                                </div>
                                <label for="productNotes">مواصفات وتفاصيل أخرى <span class="optional-mark">(اختياري)</span></label>
                                <textarea id="productNotes" rows="3" placeholder="اكتب هنا أي تفاصيل إضافية تريد إعلام الآدمن بها..."></textarea>
                            </div>

                        </div>

                        <button type="submit" class="btn-submit-order">
                            <i class="fas fa-paper-plane"></i> إضافة طلب
                        </button>
                    </form>
                </section>

            </div>
        </main>

    </div>

    <script>
        // دالة فتح وغلق السايدبار التفاعلية (3 خطوط)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        // دالة الضغط على زر إضافة طلب تفتح رسالة ثم تحول المستخدم لصفحة طلباتي المستقلة
        function submitOrder(event) {
            event.preventDefault(); 
            alert('تم تسجيل الطلب بنجاح.');
            window.location.href = 'my-orders.html'; 
        }

        function logout() {
            if(confirm("هل أنت متأكد من رغبتك في تسجيل الخروج؟")) {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
