<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كل الطلبات الواردة - لوحة الآدمن</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #1a0f2e 0%, #0b0414 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* --- السايدبار الخاص بالآدمن --- */
        .admin-sidebar {
            width: 260px;
            background-color: rgba(11, 4, 20, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
        }

        .icon-purple { color: #a855f7; }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            color: #a29db0;
            text-decoration: none;
            font-weight: 600;
            font-size: 14.5px;
            border-radius: 10px;
            transition: all 0.2s;
            background: none;
            border: none;
            width: 100%;
            text-align: right;
            cursor: pointer;
        }

        .menu-item:hover {
            background-color: rgba(168, 85, 247, 0.15);
            color: #a855f7;
        }

        .menu-item.active {
            background-color: #a855f7;
            color: white;
        }

        .logout-btn {
            margin-top: auto;
            color: #ff3344;
        }
        .logout-btn:hover {
            background-color: rgba(255, 51, 68, 0.1);
        }

        /* --- المحتوى الرئيسي للآدمن --- */
        .admin-content {
            flex: 1;
            padding: 40px;
        }

        .admin-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .admin-header h2 { font-size: 24px; font-weight: 700; }
        .subtitle { font-size: 14px; color: #a29db0; margin-top: 5px; }

        /* --- تصميم جدول الطلبات الفخم --- */
        .table-container {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            min-width: 800px;
        }

        th {
            background-color: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            font-weight: 700;
            font-size: 14px;
            padding: 16px;
            border-bottom: 2px solid rgba(168, 85, 247, 0.2);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: #e2def0;
            vertical-align: middle;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .product-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }
        .product-link:hover { text-decoration: underline; }

        .status-badge {
            background-color: rgba(234, 179, 8, 0.15);
            color: #eab308;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .price-input {
            width: 110px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.4);
            color: white;
            text-align: center;
        }

        .save-btn {
            background: #a855f7;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .save-btn:hover { background: #9333ea; }

        .notes-text {
            color: #a29db0;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 900px) {
            .admin-wrapper { flex-direction: column; }
            .admin-sidebar { width: 100%; height: auto; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="admin-wrapper">
        
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-user-shield icon-purple"></i>
                <span>لوحة التحكم (الآدمن)</span>
            </div>
            
            <nav class="sidebar-menu">
                <a href="review-payments.html" class="menu-item">
                    <i class="fas fa-receipt"></i>
                    <span>مراجعة الوصولات والدفع</span>
                </a>
                
                <a href="all-orders.html" class="menu-item active">
                    <i class="fas fa-boxes"></i>
                    <span>كل الطلبات الواردة</span>
                </a>
                
                <a href="manage-users.html" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>إدارة المستخدمين</span>
                </a>

                <button class="menu-item logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </button>
            </nav>
        </aside>

        <main class="admin-content">
            <header class="admin-header">
                <div class="welcome-box">
                    <h2><i class="fas fa-boxes icon-purple"></i> إدارة الطلبات الواردة</h2>
                    <p class="subtitle">هنا تظهر المنتجات المرسلة من الزبائن لتقومي بتسعيرها وإضافة العمولات</p>
                </div>
            </header>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>رقم الزبون (ID)</th>
                            <th>رابط المنتج الأصلي</th>
                            <th>المقاس</th>
                            <th>اللون</th>
                            <th>الكمية</th>
                            <th>الملاحظات</th>
                            <th>الحالة</th>
                            <th>تحديد السعر (دج)</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="adminOrdersTable">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetchOrdersForAdmin();
        });

        function fetchOrdersForAdmin() {
            const tableBody = document.getElementById('adminOrdersTable');
            tableBody.innerHTML = `<tr><td colspan="9" style="text-align: center; color: #a29db0;">🔄 جاري جلب الطلبات الحية...</td></tr>`;

            fetch('http://localhost:5000/api/orders') 
                .then(res => res.json())
                .then(orders => {
                    tableBody.innerHTML = ""; 

                    if (!orders || orders.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="9" style="text-align: center; color: #a29db0;">📭 لا توجد أي طلبات مسجلة حالياً.</td></tr>`;
                        return;
                    }

                    orders.forEach(order => {
                        const priceInput = order.price && order.price > 0 
                            ? `<span style="color: #22c55e; font-weight: bold;">${order.price} دج</span>`
                            : `<input type="number" id="price-${order._id}" class="price-input" placeholder="أدخلي السعر">`;

                        const actionButton = order.price && order.price > 0
                            ? `<span style="color: #a29db0; font-size: 12px;">تم الحفظ ✓</span>`
                            : `<button onclick="updateOrderPrice('${order._id}')" class="save-btn">حفظ السعر</button>`;

                        const statusBadge = order.price && order.price > 0
                            ? `<span class="status-badge" style="background-color: rgba(34, 197, 94, 0.15); color: #22c55e;">تم التسعير</span>`
                            : `<span class="status-badge">بانتظار التسعير</span>`;

                        const shortUserId = order.userId ? order.userId.substring(0, 8) + '...' : 'مجهول';

                        const row = `
                            <tr>
                                <td style="font-family: monospace; color: #a855f7; font-weight: bold;">${shortUserId}</td>
                                <td><a href="${order.productLink}" target="_blank" class="product-link"><i class="fas fa-external-link-alt"></i> فتح الرابط</a></td>
                                <td>${order.size || 'N/A'}</td>
                                <td>${order.color || 'N/A'}</td>
                                <td style="font-weight: bold;">${order.quantity || 1}</td>
                                <td><div class="notes-text" title="${order.notes || ''}">${order.notes || 'لا يوجد'}</div></td>
                                <td>${statusBadge}</td>
                                <td>${priceInput}</td>
                                <td>${actionButton}</td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                })
                .catch(err => {
                    console.error(err);
                    tableBody.innerHTML = `<tr><td colspan="9" style="text-align: center; color: #ff3344;">❌ فشل الاتصال بالسيرفر وجلب البيانات.</td></tr>`;
                });
        }

        function updateOrderPrice(orderId) {
    const priceValue = document.getElementById(`price-${orderId}`).value;
    if (!priceValue || priceValue <= 0) {
        alert("يرجى إدخال سعر صحيح.");
        return;
    }

    // تأكدي من الرابط تماماً ومن استخدام الـ Backticks `` وليس ''
    fetch(`http://localhost:5000/api/admin/orders/price/${orderId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ price: parseFloat(priceValue) })
    })
    .then(res => {
        if (!res.ok) {
            throw new Error(`Server responded with status ${res.status}`);
        }
        return res.json();
    })
    .then(data => {
        if (data.success) {
            alert("✅ تم حفظ السعر بنجاح وتحديث الجدول!");
            fetchOrdersForAdmin(); // إعادة تحديث الجدول تلقائياً
        } else {
            alert("❌ خطأ من السيرفر: " + data.message);
        }
    })
    .catch(err => {
        console.error(err);
        alert("❌ حدث خطأ في الاتصال: تأكدي من تحديث السيرفر.");
    });
}

        function logout() {
            if(confirm("هل تريد تسجيل الخروج؟")) window.location.href = 'login.html';
        }
    </script>
</body>
</html>
