<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استرجاع كلمة السر</title>
    <style>/* إعدادات خط آبل سان فرانسيسكو والنظام النظيف */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: -0.2px;
}

body {
    background-color: #fcfbf9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
}

/* --- نظام الخلفية الهادئة والمبسطة --- */
.background-animation {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    overflow: hidden;
    background: radial-gradient(circle at 50% 50%, #ffffff 0%, #faf8f5 100%);
}

.shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    mix-blend-mode: multiply;
    opacity: 0.25; /* تقليل الشفافية لجعلها هادئة جداً */
    animation: floatAnimation 20s infinite alternate ease-in-out;
}

.shape1 {
    top: -10%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: #ff6600;
}

.shape2 {
    bottom: -20%;
    left: -10%;
    width: 600px;
    height: 600px;
    background: #ffd0b3;
    animation-delay: 2s;
}

.shape3 {
    top: 40%;
    left: 30%;
    width: 300px;
    height: 300px;
    background: #fff0e6;
    animation-delay: 5s;
}

@keyframes floatAnimation {
    0% { transform: translate(0px, 0px) scale(1); }
    50% { transform: translate(30px, -40px) scale(1.05); }
    100% { transform: translate(-15px, 15px) scale(0.95); }
}

/* --- حاوية النموذج الضبابية الأنيقة --- */
.forgot-container {
    background-color: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 40px 35px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03), 0 1px 5px rgba(0, 0, 0, 0.01);
    width: 100%;
    max-width: 420px;
    border: 1px solid rgba(255, 255, 255, 0.8);
}

/* إدارة ظهور الأقسام بسلاسة */
.step-box {
    display: none;
}

.step-box.active {
    display: block;
    animation: fadeIn 0.35s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    text-align: center;
    color: #1d1d1f;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
}

.subtitle {
    text-align: center;
    color: #86868b; /* رمادي خفيف غير تشتيتي */
    font-size: 13.5px;
    margin-bottom: 28px;
    line-height: 1.4;
}

.form-group {
    margin-bottom: 22px;
    display: flex;
    flex-direction: column;
}

label {
    font-size: 13px;
    font-weight: 600;
    color: #48484a;
    margin-bottom: 8px;
}

input {
    padding: 14px;
    border: 1.5px solid #e5e5ea;
    border-radius: 12px;
    font-size: 15px;
    background-color: rgba(255, 255, 255, 0.6);
    color: #1d1d1f;
    transition: all 0.2s ease;
    text-align: right;
}

input:focus {
    border-color: #ff6600;
    background-color: #ffffff;
    outline: none;
    box-shadow: 0 0 0 4px rgba(255, 102, 0, 0.12);
}

/* عرض سؤال الأمان بشكل هادئ ومنظم */
.security-question-display {
    background-color: #fafafa;
    padding: 16px;
    border-radius: 12px;
    color: #3a3a3c;
    font-weight: 600;
    font-size: 14px;
    border: 1px solid #e5e5ea;
    text-align: center;
    margin-top: 2px;
}

/* حقل كلمة السر والعين */
.password-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.password-wrapper input {
    width: 100%;
    padding-left: 45px; 
}

.toggle-password {
    position: absolute;
    left: 15px;
    color: #86868b;
    cursor: pointer;
    font-size: 16px;
    transition: color 0.2s ease;
}

.toggle-password:hover {
    color: #ff6600;
}

/* أزرار العمليات الموحدة والبرتقالية المتناسقة */
.btn-action {
    width: 100%;
    padding: 14px;
    background-color: #ff6600;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(255, 102, 0, 0.15);
    margin-top: 8px;
}

.btn-action:hover {
    background-color: #e65c00;
    transform: translateY(-0.5px);
    box-shadow: 0 6px 20px rgba(255, 102, 0, 0.22);
}

.btn-action:active {
    transform: translateY(0);
}

/* روابط العودة للخلف الرمادية الناعمة */
.back-link {
    text-align: center;
    margin-top: 24px;
    font-size: 13.5px;
}

.back-link a {
    color: #86868b;
    text-decoration: none;
    transition: color 0.2s ease;
}

.back-link a:hover {
    color: #ff6600;
    text-decoration: underline;
}</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="background-animation">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <div class="forgot-container">
        
        <div id="step1" class="step-box active">
            <h2>البحث عن حسابك</h2>
            <p class="subtitle">أدخل بريدك الإلكتروني المربوط بالحساب للعثور عليه</p>
            
            <div class="form-group">
                <label for="searchEmail">البريد الإلكتروني</label>
                <input type="email" id="searchEmail" required placeholder="example@email.com">
            </div>
            
            <button type="button" class="btn-action" onclick="goToStep2()">بحث عن الحساب</button>
            
            <div class="back-link">
                <a href="login.html">العودة لتسجيل الدخول</a>
            </div>
        </div>

        <div id="step2" class="step-box">
            <h2>سؤال الأمان</h2>
            <p class="subtitle">يرجى الإجابة على سؤال الأمان المخصص لحسابك</p>
            
            <div class="form-group">
                <label>سؤال الأمان الخاص بك</label>
                <div class="security-question-display" id="displayedQuestion">
                    "ما هو اسم أول مدرسة درست فيها؟"
                </div>
            </div>

            <div class="form-group">
                <label for="securityAnswer">إجابة سؤال الأمان</label>
                <input type="text" id="securityAnswer" required placeholder="اكتب الإجابة بدقة">
            </div>
            
            <button type="button" class="btn-action" onclick="goToStep3()">تحقق من الإجابة</button>
        </div>

        <div id="step3" class="step-box">
            <h2>كلمة مرور جديدة</h2>
            <p class="subtitle">قم بتعيين كلمة مرور جديدة وقوية لحسابك</p>
            
            <div class="form-group">
                <label for="newPassword">كلمة السر الجديدة</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" required placeholder="••••••••">
                    <i class="far fa-eye-slash toggle-password" id="toggleNewPassword"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">تأكيد كلمة السر الجديدة</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" required placeholder="••••••••">
                    <i class="far fa-eye-slash toggle-password" id="toggleConfirmPassword"></i>
                </div>
            </div>
            
            <button type="button" class="btn-action btn-save" onclick="finishReset()">تحديث كلمة السر</button>
        </div>

    </div>

    <script>
        // دالة الانتقال لخطوة سؤال الأمان
        function goToStep2() {
            const email = document.getElementById('searchEmail').value;
            if(email) {
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
            } else {
                alert('الرجاء إدخال البريد الإلكتروني أولاً');
            }
        }

        // دالة الانتقال لخطوة كلمة السر الجديدة
        function goToStep3() {
            const answer = document.getElementById('securityAnswer').value;
            if(answer) {
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
            } else {
                alert('الرجاء كتابة إجابة سؤال الأمان');
            }
        }

        // دالة الحفظ النهائي والعودة لتسجيل الدخول
        function finishReset() {
            const pass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if(!pass || !confirmPass) {
                alert('الرجاء ملء حقول كلمة السر');
                return;
            }
            if(pass !== confirmPass) {
                alert('كلمتا السر غير متطابقتين!');
                return;
            }
            
            alert('تم إعادة تعيين كلمة السر بنجاح! يمكنك الآن تسجيل الدخول.');
            window.location.href = 'login.html';
        }

        // إعداد ميزة إخفاء وإظهار كلمة السر للأعين
        setupPasswordToggle('#toggleNewPassword', '#newPassword');
        setupPasswordToggle('#toggleConfirmPassword', '#confirmPassword');

        function setupPasswordToggle(iconId, inputId) {
            const icon = document.querySelector(iconId);
            const input = document.querySelector(inputId);
            icon.addEventListener('click', function () {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }
    </script>
</body>
</html>
