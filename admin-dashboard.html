<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الآدمن - إدارة الطلبات</title>
    <style>
        /* إعدادات النظام وخط سان فرانسيسكو الاحترافي */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #1a0f2e 0%, #0b0414 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* --- زر القائمة التفاعلي للشاشات الصغيرة --- */
        .menu-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            transition: all 0.2s ease;
        }

        .menu-toggle-btn:hover {
            background-color: #9333ea;
            transform: scale(1.05);
        }

        /* --- تصميم القائمة الجانبية (Sidebar) --- */
        .sidebar {
            width: 260px;
            background-color: rgba(11, 4, 20, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            padding: 30px 16px;
            position: fixed;
            height: 100vh;
            right: -260px; 
            top: 0;
            z-index: 95;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 19px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 40px;
            padding-right: 12px;
        }

        .purple-icon {
            color: #a855f7;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: none;
            border: none;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            text-align: right;
            color: #a29db0;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            width: 100%;
            text-decoration: none;
        }

        .menu-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #a855f7;
        }

        .menu-item.active {
            background-color: #a855f7;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .logout-btn {
            margin-top: auto;
            color: #ff3344;
        }

        .logout-btn:hover {
            background-color: rgba(255, 51, 68, 0.1);
        }

        /* --- قسم المحتوى الرئيسي وجدول البيانات الفخم --- */
        .main-content {
            flex: 1;
            margin-right: 0;
            padding: 40px 30px;
            padding-top: 90px;
            width: 100%;
            transition: filter 0.3s ease;
        }

        body.sidebar-active .main-content {
            filter: brightness(0.6);
            pointer-events: none;
        }

        .section-title-box h2 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .section-subtitle {
            font-size: 14px;
            color: #a29db0;
            margin-bottom: 30px;
        }

        /* حاوية الجدول لمنع خروج البيانات في الشاشات الصغيرة */
        .table-container {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            min-width: 700px;
        }

        th {
            background-color: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            font-weight: 700;
            font-size: 14px;
            padding: 16px;
            border-bottom: 2px solid rgba(168, 85, 247, 0.2);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: #e2def0;
            vertical-align: middle;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        /* روابط المنتجات */
        .product-link {
            color: #38bdf8;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .product-link:hover {
            text-decoration: underline;
        }

        /* ستايل خانة الملاحظات */
        .notes-text {
            color: #a29db0;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .notes-text:hover {
            white-space: normal;
            max-width: none;
        }

        /* شارات الحالة الافتراضية (قيد التسعير) */
        .status-badge {
            background-color: rgba(234, 179, 8, 0.15);
            color: #eab308;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        /* استعلامات الشاشات الكبيرة */
        @media (min-width: 769px) {
            .sidebar {
                right: 0;
            }
            .main-content {
                margin-right: 260px;
                padding-top: 40px;
            }
            .menu-toggle-btn {
                display: none;
            }
            body.sidebar-active .main-content {
                filter: none;
                pointer-events: auto;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        
        <button class="menu-toggle-btn" id="menuToggle" onclick="toggleSidebar(event)">
            <i class="fas fa-bars"></i>
        </button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-shield-alt purple-icon"></i>
                <span>لوحة التحكم (الآدمن)</span>
            </div>
            
            <nav class="sidebar-menu">
                <a href="admin-dashboard.html" class="menu-item active">
                    <i class="fas fa-boxes"></i>
                    <span>إدارة طلبات الزبائن</span>
                </a>
                
                <button class="menu-item logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </button>
            </nav>
        </aside>

        <main class="main-content" id="mainContent">
            
            <div class="content-body">
                <div class="section-title-box">
                    <h2>طلبات الوساطة الواردة</h2>
                    <p class="section-subtitle">استعرض الطلبات الجديدة المرسلة من الزبائن للبدء في تسعيرها</p>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>رقم الزبون (ID)</th>
                                <th>رابط المنتج الأصلي</th>
                                <th>المقاس / القياس</th>
                                <th>اللون المطلوب</th>
                                <th>الكمية</th>
                                <th>مواصفات وملاحظات الزبون</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="adminOrdersTable">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>

    </div>

    <script>
        // دالة التحكم في السايدبار التفاعلية
        function toggleSidebar(event) {
            event.stopPropagation(); 
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            document.body.classList.toggle('sidebar-active');
        }

        window.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.getElementById('menuToggle');
            
            if (sidebar.classList.contains('open') && !sidebar.contains(event.target) && !menuToggle.contains(event.target)) {
                sidebar.classList.remove('open');
                document.body.classList.remove('sidebar-active');
            }
        });

        // جلب الطلبات من السيرفر عند تحميل الصفحة فوراً
        document.addEventListener("DOMContentLoaded", function() {
            fetchOrdersForAdmin();
        });

        function fetchOrdersForAdmin() {
            const tableBody = document.getElementById('adminOrdersTable');
            tableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #a29db0;">🔄 جاري جلب الطلبات الجديدة...</td></tr>`;

            // جلب كافة الطلبات المخزنة في الـ Backend
            fetch('/api/orders') 
                .then(res => res.json())
                .then(orders => {
                    tableBody.innerHTML = ""; // تفريغ رسالة التحميل

                    if (!orders || orders.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #a29db0;">📭 لا توجد أي طلبات مسجلة في قاعدة البيانات حالياً.</td></tr>`;
                        return;
                    }

                    // بناء الأسطر بناءً على حقول add-order الجديدة والمحدثة
                    orders.forEach(order => {
                        const row = `
                            <tr>
                                <td style="font-family: monospace; color: #a855f7; font-weight: bold;">${order.userId || 'مجهول'}</td>
                                <td>
                                    <a href="${order.productLink}" target="_blank" class="product-link">
                                        <i class="fas fa-external-link-alt"></i> فتح الرابط
                                    </a>
                                </td>
                                <td>${order.size || 'N/A'}</td>
                                <td>${order.color || 'N/A'}</td>
                                <td style="font-weight: bold; color: #ffffff;">${order.quantity || 1}</td>
                                <td>
                                    <div class="notes-text" title="اضغطي مرتين لتكبير النص">
                                        ${order.notes || '<span style="opacity: 0.4;">لا توجد ملاحظات</span>'}
                                    </div>
                                </td>
                                <td><span class="status-badge">بانتظار التسعير</span></td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                })
                .catch(err => {
                    console.error("Error fetching admin orders:", err);
                    tableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #ff3344;">❌ فشل الاتصال بالسيرفر وجلب البيانات.</td></tr>`;
                });
        }

        function logout() {
            if(confirm("هل أنت متأكد من رغبتك في تسجيل الخروج من لوحة الآدمن؟")) {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
