<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة طلب شحن جديد</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #1a0f2e 0%, #0b0414 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .form-header h2 i {
            color: #a855f7;
        }

        .form-header p {
            font-size: 13px;
            color: #a29db0;
            margin-top: 6px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 13px;
            color: #e2def0;
            font-weight: 600;
        }

        .input-group input, .input-group select {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #a855f7;
            background-color: rgba(168, 85, 247, 0.05);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            background-color: #a855f7;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #9333ea;
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #a29db0;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: #ffffff;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2><i class="fas fa-cart-plus"></i> إضافة طلب شحن جديد</h2>
            <p>أدخلي تفاصيل المنتج الذي ترغبين في توسيط شحنه وشراءه</p>
        </div>

        <form id="addOrderForm" onsubmit="submitNewOrder(event)">
            
            <div class="input-group">
                <label for="productLink"><i class="fas fa-link"></i> رابط المنتج (من موقع الشراء الأصلي)</label>
                <input type="url" id="productLink" placeholder="https://example.com/product..." required>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="size"><i class="fas fa-ruler"></i> المقاس / القياس</label>
                    <input type="text" id="size" placeholder="مثال: M, L, XL, 42" required>
                </div>
                
                <div class="input-group">
                    <label for="color"><i class="fas fa-palette"></i> اللون المطلـوب</label>
                    <input type="text" id="color" placeholder="مثال: أسود، أزرق ملكي" required>
                </div>
            </div>

            <div class="input-group">
                <label for="quantity"><i class="fas fa-calculator"></i> الكمية المطلوبة</label>
                <input type="number" id="quantity" min="1" value="1" required>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i> تسجيل الطلب وإرساله للتسعير
            </button>

            <a href="/panel.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
        </form>
    </div>

    <script>
        // دالة معالجة وإرسال الاستمارة للسيرفر
        function submitNewOrder(event) {
            event.preventDefault();

            // جلب معرّف المستخدم المخزن عند تسجيل الدخول
            const userId = localStorage.getItem('userId');

            if (!userId) {
                alert("❌ خطأ: لم يتم العثور على معرّف الزبون. يرجى تسجيل الدخول أولاً.");
                window.location.href = '/login.html';
                return;
            }

            // تجميع البيانات من الواجهة
            const orderData = {
                userId: userId,
                productLink: document.getElementById('productLink').value,
                size: document.getElementById('size').value,
                color: document.getElementById('color').value,
                quantity: parseInt(document.getElementById('quantity').value)
            };

            // إرسال الطلب عبر المسار النسبي الآمن بدون CORS مشاكل
            fetch('/api/orders/new', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('✅ تم تسجيل طلبكِ بنجاح في قاعدة البيانات! بانتظار تسعير الإدارة.');
                    window.location.href = '/my-orders.html'; // التوجيه لصفحة طلباتي تلقائياً
                } else {
                    alert('❌ فشل إرسال الطلب: ' + data.message);
                }
            })
            .catch(err => {
                console.error('Error during order insertion:', err);
                alert('❌ حدث خطأ غير متوقع أثناء الاتصال بالسيرفر.');
            });
        }
    </script>
</body>
</html>
