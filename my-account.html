<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - منصة الوساطة</title>
    <style>/* إعدادات خط آبل سان فرانسيسكو والتصفير */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

body {
    /* الخلفية البنفسجية المتدرجة الفخمة */
    background: radial-gradient(circle at 30% 20%, #2e1a47 0%, #120721 100%);
    color: #ffffff;
    min-height: 100vh;
    padding: 40px 20px;
}

.account-page-container {
    max-width: 1000px;
    margin: 0 auto;
}

/* --- الهيدر العلوي --- */
.account-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    padding-bottom: 20px;
    margin-bottom: 30px;
}

.header-titles h2 {
    font-size: 24px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 5px;
}

.purple-light-text {
    color: #a855f7;
}

.subtitle {
    font-size: 14px;
    color: #a29db0;
}

/* زر العودة للوحة التحكم */
.btn-back-dashboard {
    color: #ffffff;
    text-decoration: none;
    font-size: 14.5px;
    font-weight: 600;
    padding: 10px 18px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background-color: rgba(255, 255, 255, 0.03);
    border-radius: 8px;
    transition: all 0.2s ease;
}

.btn-back-dashboard:hover {
    background-color: rgba(168, 85, 247, 0.2);
    border-color: #a855f7;
}

/* --- تقسيم البطاقات (Grid Layout) --- */
.account-grid-layout {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 25px;
}

/* التنسيق المشترك للبطاقات الزجاجية الفخمة */
.account-card {
    background-color: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 25px;
}

.card-title-box {
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding-bottom: 15px;
    margin-bottom: 20px;
}

.card-title-box h3 {
    font-size: 16px;
    font-weight: 700;
}

.icon-purple { color: #a855f7; font-size: 18px; }
.icon-red { color: #ff3344; font-size: 18px; }

/* --- تفاصيل بطاقة المعلومات الشخصية --- */
.info-group {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

.info-group:last-child {
    border-bottom: none;
}

.info-label {
    color: #a29db0;
    font-size: 14px;
}

.info-value {
    color: #ffffff;
    font-weight: 600;
    font-size: 14.5px;
}

/* --- تفاصيل بطاقة الأمان والفورم --- */
.form-field {
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
}

.form-field label {
    font-size: 13px;
    color: #e2def0;
    margin-bottom: 8px;
    font-weight: 600;
}

.form-field input {
    padding: 12px 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background-color: rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    font-size: 14px;
    color: #ffffff;
    text-align: right;
    transition: border-color 0.15s ease;
}

.form-field input:focus {
    outline: none;
    border-color: #a855f7;
}

/* ستايل مخصص للحقول غير القابلة للتعديل مثل السؤال الثابت */
.readonly-input {
    background-color: rgba(255, 255, 255, 0.02) !important;
    color: #a29db0 !important;
    border-style: dashed !important;
    cursor: not-allowed;
}

/* زر الحفظ بالبنفسجي الفخم */
.btn-save-security {
    width: 100%;
    padding: 14px;
    background-color: #a855f7;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: background-color 0.15s;
}

.btn-save-security:hover {
    background-color: #9333ea;
}

/* التوافق مع الشاشات الصغيرة للهواتف */
@media (max-width: 768px) {
    .account-grid-layout {
        grid-template-columns: 1fr; /* ترتيب عمودي فوق بعضهم في الهاتف */
    }
    .account-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }
    .btn-back-dashboard {
        width: 100%;
        text-align: center;
    }
}</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="account-page-container">
        
        <header class="account-header">
            <div class="header-titles">
                <h2><i class="fas fa-user-cog purple-light-text"></i> إعدادات حسابي الشخصي</h2>
                <p class="subtitle">إدارة معلوماتك الشخصية، وتأمين حسابك عبر تحديث كلمة المرور وسؤال الأمان</p>
            </div>
            <a href="panel.html" class="btn-back-dashboard">
                <i class="fas fa-arrow-left"></i> العودة للوحة التحكم
            </a>
        </header>

        <div class="account-grid-layout">
            
            <div class="account-card profile-info-card">
                <div class="card-title-box">
                    <i class="fas fa-id-card icon-purple"></i>
                    <h3>المعلومات الشخصية</h3>
                </div>
                
                <div class="info-group">
                    <span class="info-label">الاسم الكامل:</span>
                    <span class="info-value">مريم دوكار</span>
                </div>
                
                <div class="info-group">
                    <span class="info-label">البريد الإلكتروني:</span>
                    <span class="info-value">mariem@example.com</span>
                </div>

                <div class="info-group">
                    <span class="info-label">رقم الهاتف:</span>
                    <span class="info-value">05XXXXXXXX</span>
                </div>

                <div class="info-group">
                    <span class="info-label">تاريخ التسجيل:</span>
                    <span class="info-value">يونيو 2026</span>
                </div>
            </div>

            <div class="account-card security-card">
                <div class="card-title-box">
                    <i class="fas fa-shield-alt icon-red"></i>
                    <h3>تأمين الحساب</h3>
                </div>

                <form id="securityForm" onsubmit="updateSecurity(event)">
                    <div class="form-field">
                        <label>كلمة المرور الحالية</label>
                        <input type="password" required placeholder="••••••••">
                    </div>

                    <div class="form-field">
                        <label>كلمة المرور الجديدة</label>
                        <input type="password" required placeholder="اكتب كلمة المرور الجديدة">
                    </div>

                    <div class="form-field">
                        <label>سؤال الأمان الحالي</label>
                        <input type="text" readonly value="ما هو اسم أول حيوان أليف قمت بتربيته؟" class="readonly-input">
                    </div>

                    <div class="form-field">
                        <label>إجابة سؤال الأمان الجديد (لتأكيد هويتك لاحقاً)</label>
                        <input type="text" required placeholder="اكتب الإجابة الجديدة هنا">
                    </div>

                    <button type="submit" class="btn-save-security">
                        <i class="fas fa-save"></i> حفظ التغييرات والأمان
                    </button>
                </form>
            </div>

        </div>

    </div>

    <script>
        function updateSecurity(event) {
            event.preventDefault();
            alert("تم تحديث بيانات الأمان وكلمة المرور بنجاح!");
            document.getElementById('securityForm').reset();
        }
    </script>
</body>
</html>
