<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الرئيسية</title>
    <style>
/* إعدادات النظام وخط سان فرانسيسكو */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

body {
    /* خلفية كاملة بتدرج البنفسجي الغامق والفاتح الفخم */
    background: radial-gradient(circle at 30% 20%, #2e1a47 0%, #120721 100%);
    color: #ffffff;
    min-height: 100vh;
    overflow-x: hidden;
}

.dashboard-wrapper {
    display: flex;
    min-height: 100vh;
    position: relative;
}

/* --- زر الـ 3 خطوط التفاعلي (Hamburger Menu) --- */
.menu-toggle-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background-color: #a855f7; 
    color: white;
    border: none;
    padding: 12px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    z-index: 100;
    box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
    transition: all 0.2s ease;
}

.menu-toggle-btn:hover {
    background-color: #9333ea;
    transform: scale(1.05);
}

/* --- تصميم القائمة الجانبية (Sidebar البنفسجي والمنظم) --- */
.sidebar {
    width: 260px;
    background-color: rgba(18, 7, 33, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    padding: 30px 16px;
    position: fixed;
    height: 100vh;
    right: -260px; /* مخفي تلقائياً في الشاشات الصغيرة ويظهر عند الضغط */
    top: 0;
    z-index: 95;
    transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* الكلاس اللي يتفعل بالـ JavaScript لفتح القائمة */
.sidebar.open {
    right: 0;
}

.sidebar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 19px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 40px;
    padding-right: 12px;
}

.purple-icon {
    color: #a855f7;
}

.sidebar-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* تحويل الأزرار لروابط لتسهيل التنقل المباشر للملفات */
.menu-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: none;
    border: none;
    padding: 14px 16px;
    border-radius: 12px;
    cursor: pointer;
    text-align: right;
    color: #a29db0;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.2s ease;
    width: 100%;
    text-decoration: none; /* لإزالة التسطير الافتراضي للروابط */
}

.menu-item:hover {
    background-color: rgba(255, 255, 255, 0.05);
    color: #a855f7;
}

.menu-item.active {
    background-color: #a855f7; /* الزر النشط بالبنفسجي */
    color: #ffffff;
    box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
}

.logout-btn {
    margin-top: auto;
    color: #ff3344;
}

.logout-btn:hover {
    background-color: rgba(255, 51, 68, 0.1);
    color: #ff3344;
}

/* --- قسم المحتوى الرئيسي --- */
.main-content {
    flex: 1;
    margin-right: 0; 
    padding: 40px 30px;
    padding-top: 90px; 
    width: 100%;
    transition: filter 0.3s ease;
}

body.sidebar-active .main-content {
    filter: brightness(0.6);
    pointer-events: none; 
}

.content-header {
    margin-bottom: 35px;
    display: flex;
    align-items: center;
}

.user-welcome {
    font-size: 16px;
    color: #e2def0;
    padding-right: 50px; 
}

.welcome-box {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    max-width: 600px;
    margin: 40px auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.welcome-box h2 {
    font-size: 26px;
    margin-bottom: 12px;
    color: #ffffff;
}

.welcome-box p {
    color: #a29db0;
    font-size: 15px;
    margin-bottom: 25px;
    line-height: 1.6;
}

/* تعديل وسم زر التوجيه إلى صفحة إضافة الطلب المستقلة */
.btn-redirect-order {
    background-color: #24b263; 
    color: white;
    border: none;
    padding: 16px 40px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(36, 178, 99, 0.25);
    transition: all 0.25s ease;
}

.btn-redirect-order:hover {
    background-color: #1e9652;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(36, 178, 99, 0.35);
}

/* --- استعلامات الشاشات الكبيرة لتثبيت السايدبار تلقائياً --- */
@media (min-width: 769px) {
    .sidebar {
        right: 0; 
    }
    .main-content {
        margin-right: 260px; 
        padding-top: 40px;
    }
    .menu-toggle-btn {
        display: none; 
    }
    body.sidebar-active .main-content {
        filter: none;
        pointer-events: auto;
    }
    .user-welcome {
        padding-right: 0;
    }
}</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        
        <button class="menu-toggle-btn" id="menuToggle" onclick="toggleSidebar(event)">
            <i class="fas fa-bars"></i>
        </button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-wallet purple-icon"></i>
                <span>منصة الوساطة</span>
            </div>
            
            <nav class="sidebar-menu">
                <a href="/add-order" class="menu-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>إضافة طلب جديد</span>
                </a>
                
                <a href="my-orders.html" class="menu-item">
                    <i class="fas fa-shopping-bag"></i>
                    <span>طلباتي</span>
                </a>
                
                <a href="my-account.html" class="menu-item">
                    <i class="fas fa-user-circle"></i>
                    <span>حسابي</span>
                </a>

                <a href="support.html" class="menu-item">
                    <i class="fas fa-headset"></i>
                    <span>الدعم الفني</span>
                </a>
                
                <button class="menu-item logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </button>
            </nav>
        </aside>

        <main class="main-content" id="mainContent">
            
            <header class="content-header">
                <div class="user-welcome">
                    <span>مرحباً بك في لوحة التحكم، 👋</span>
                </div>
            </header>

            <div class="content-body">
                
                <div class="welcome-box">
                    <h2>أهلاً بكِ في منصة الوساطة المضمونة</h2>
                    <p>يمكنكِ الآن البدء بإنشاء طلبات شراء وشحن جديدة، وتتبع حالاتها مباشرة، أو التواصل مع الدعم الفني الخاص بالمنصة في أي وقت.</p>
                    
                    <a href="/add-order" class="btn-redirect-order">
                        <i class="fas fa-cart-plus"></i> اضغطي هنا لإنشاء طلب جديد الآن
                    </a>
                </div>

            </div>
        </main>

    </div>

    <script>
        // دالة فتح وغلق السايدبار التفاعلية (3 خطوط)
        function toggleSidebar(event) {
            event.stopPropagation(); 
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            document.body.classList.toggle('sidebar-active');
        }

        // إغلاق السايدبار تلقائياً عند الضغط في أي مكان خارجها
        window.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.getElementById('menuToggle');
            
            if (sidebar.classList.contains('open') && !sidebar.contains(event.target) && !menuToggle.contains(event.target)) {
                sidebar.classList.remove('open');
                document.body.classList.remove('sidebar-active');
            }
        });

        function logout() {
            if(confirm("هل أنت متأكد من رغبتك في تسجيل الخروج؟")) {
                localStorage.clear(); // تنظيف الجلسة
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
